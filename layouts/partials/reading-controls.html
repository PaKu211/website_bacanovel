<div class="flex flex-wrap items-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-soft dark:border-slate-800 dark:bg-slate-900">
  <div class="flex items-center gap-3">
    <span class="font-medium text-slate-600 dark:text-slate-300">Ukuran Teks:</span>
    <button type="button" id="font-decrease" class="control-btn" aria-label="Kecilkan teks">-</button>
    <span id="font-display" class="min-w-14 text-center font-semibold text-slate-700 dark:text-slate-200">100%</span>
    <button type="button" id="font-increase" class="control-btn" aria-label="Besarkan teks">+</button>
  </div>

  <div class="ml-auto flex items-center gap-3">
    <button type="button" id="theme-toggle" class="control-btn" aria-label="Toggle dark mode">
      <span id="theme-toggle-sun" class="hidden">Light</span>
      <span id="theme-toggle-moon">Dark</span>
    </button>
  </div>
</div>
