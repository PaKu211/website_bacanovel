<nav class="mt-10 flex flex-col gap-3 border-t border-slate-200 pt-6 dark:border-slate-800 sm:flex-row sm:items-center sm:justify-between">
  <div>
    {{ if .Params.previous_chapter }}
      <a class="control-btn" href="{{ .Params.previous_chapter }}">&larr; Previous Chapter</a>
    {{ else if .PrevInSection }}
      <a class="control-btn" href="{{ .PrevInSection.RelPermalink }}">&larr; Previous Chapter</a>
    {{ else }}
      <span class="control-btn cursor-not-allowed opacity-50">&larr; Previous Chapter</span>
    {{ end }}
  </div>

  <a class="control-btn" href="#">Kembali ke Atas</a>

  <div class="sm:ml-auto">
    {{ if .Params.next_chapter }}
      <a class="control-btn control-btn-active" href="{{ .Params.next_chapter }}">Next Chapter &rarr;</a>
    {{ else if .NextInSection }}
      <a class="control-btn control-btn-active" href="{{ .NextInSection.RelPermalink }}">Next Chapter &rarr;</a>
    {{ else }}
      <span class="control-btn control-btn-active cursor-not-allowed opacity-70">Next Chapter &rarr;</span>
    {{ end }}
  </div>
</nav>
