<div class="group relative flex flex-col sm:flex-row gap-4 p-4 rounded-xl border border-dashed border-neutral-800 bg-[#181818] hover:bg-[#202020] transition-all duration-300 hover:-translate-y-1 shadow-md hover:shadow-xl">
    
    <!-- Bagian Cover Novel (Aspek Rasio 3:4 Standar Buku) -->
    <div class="relative w-full sm:w-32 aspect-[3/4] rounded-lg overflow-hidden bg-neutral-800 flex-shrink-0">
        <!-- cover.jpg hasil unzip dari pipeline lncrawl -->
        <img src="cover.jpg" alt="Cover Novel" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
        <span class="absolute top-2 left-2 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-widest bg-blue-600 rounded-md text-white">
            Ongoing
        </span>
    </div>

    <!-- Bagian Informasi Metadata Novel -->
    <div class="flex flex-col flex-grow">
        <!-- Mengambil 'title' dari meta.json -->
        <h3 class="text-xl font-bold text-white group-hover:text-blue-400 transition-colors line-clamp-1">
            Petualangan Dunia Paralel
        </h3>
        
        <!-- Mengambil 'author' dari meta.json -->
        <span class="text-xs text-neutral-500 mt-0.5">Oleh: Penulis Hebat</span>

        <!-- Mengambil 'synopsis' dari meta.json -->
        <p class="text-sm text-neutral-400 mt-2 line-clamp-2 leading-relaxed">
            Mulai baca kisah seru dan bab terbaru dari novel ini secara gratis. Sinopsis lengkap yang menceritakan perjalanan epik melintasi dimensi.
        </p>

        <!-- Wadah Genre/Tags dari meta.json -->
        <div class="flex flex-wrap gap-1.5 mt-3">
            <span class="px-2 py-0.5 text-xs rounded-md bg-neutral-800 text-neutral-400">Fantasy</span>
            <span class="px-2 py-0.5 text-xs rounded-md bg-neutral-800 text-neutral-400">Action</span>
            <span class="px-2 py-0.5 text-xs rounded-md bg-neutral-800 text-neutral-400">Isekai</span>
        </div>

        <!-- Tombol Aksi Baku -->
        <div class="mt-4 pt-3 border-t border-neutral-800 flex justify-between items-center">
            <span class="text-xs text-neutral-500 font-mono">Vol.1 • 12 Chapters</span>
            <a href="{{ .RelPermalink }}" class="inline-flex items-center gap-1 text-sm font-medium text-blue-400 hover:text-blue-300">
                Buka Daftar Bab <span class="transition-transform group-hover:translate-x-1">→</span>
            </a>
        </div>
    </div>
</div>
