<article class="novel-card">
  <div class="aspect-[4/3] bg-gradient-to-br from-sky-100 to-indigo-200 dark:from-slate-800 dark:to-slate-700"></div>
  <div class="p-6">
    <p class="text-xs uppercase tracking-[0.25em] text-slate-400 dark:text-slate-500">Novel</p>
    <h2 class="mt-3 text-2xl font-semibold tracking-tight text-slate-900 dark:text-white">{{ .Title }}</h2>
    {{ with .Params.description }}
      <p class="mt-3 line-clamp-3 text-sm leading-6 text-slate-600 dark:text-slate-300">{{ . }}</p>
    {{ else }}
      <p class="mt-3 line-clamp-3 text-sm leading-6 text-slate-600 dark:text-slate-300">Mulai baca kisah seru dan bab terbaru dari novel ini secara gratis.</p>
    {{ end }}
    <a class="mt-6 inline-flex items-center font-semibold text-sky-600 hover:text-sky-700 dark:text-sky-400 dark:hover:text-sky-300" href="{{ .Permalink }}">Buka Daftar Bab &rarr;</a>
  </div>
</article>
