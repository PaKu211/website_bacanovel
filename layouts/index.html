{{ define "main" }}
<div class="container mx-auto max-w-2xl px-4 py-8">
  
  <!-- VIEW 1: BERANDA & DAFTAR ISI (Default Ditampilkan) -->
  <div id="homepage-view" class="space-y-6">
    <header class="mb-8 pb-4 border-b border-dashed border-neutral-800">
      <h1 class="text-3xl font-extrabold text-white tracking-tight">Katalog Novel</h1>
      <p class="text-sm text-neutral-400 mt-1">Selamat membaca proyek hobi buatan sendiri.</p>
    </header>

    <!-- Wadah Kartu Novel Dinamis -->
    <div id="novel-list" class="space-y-4">
      <!-- Diisi otomatis oleh JavaScript -->
    </div>
  </div>

  <!-- VIEW 2: HALAMAN BACA (Default Disembunyikan via kelas 'hidden') -->
  <div id="reading-view" class="hidden animate-in fade-in-50 duration-200">
    <button onclick="router.navigate('/')" class="mb-6 inline-flex items-center gap-2 text-sm text-blue-400 hover:text-blue-300 font-medium cursor-pointer">
      ← Kembali ke Daftar Bab
    </button>
    
    <header class="mb-8 pb-4 border-b border-dashed border-neutral-800">
      <h1 id="chapter-title" class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight"></h1>
      <div class="flex items-center gap-2 mt-2 text-xs text-neutral-500 font-mono">
        <span id="novel-parent-name"></span>
      </div>
    </header>

    <!-- Tempat Suntik Teks Cerita -->
    <div id="chapter-content" class="text-neutral-300 text-lg sm:text-xl font-normal leading-relaxed tracking-wide space-y-6 [overflow-wrap:break-word]">
      <!-- Diisi otomatis oleh JavaScript -->
    </div>
  </div>

</div>

<!-- Suntik Otak JavaScript Pengendali Router SPA -->
<script src="/js/app.js" defer></script>
{{ end }}
